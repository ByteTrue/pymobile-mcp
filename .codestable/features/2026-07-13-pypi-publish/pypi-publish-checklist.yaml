    status: pending
dod:
  commands:
    - id: CMD-001
      command: python -m pytest
      core: true
    - id: CMD-PYPI-001
      command: >
        python -c 'from pathlib import Path; p=Path(".codestable/features/2026-07-13-pypi-publish/pypi-publish-status.md");
        assert p.is_file(), "missing status file";
        t=p.read_text().lower();
        ok=("status: published" in t) or ("status: blocked-by-env" in t) or ("status: failed" in t);
        assert ok, t;
        pub="status: published" in t;
        assert (not pub) or (("0.3.0" in t) and (("pip" in t) or ("index" in t) or ("install" in t)))'
      core: false
