    status: pending
checks:
  - item: precheck release-0.3 accepted and version 0.3.0
    status: pending
  - item: status file exists with published blocked-by-env or failed
    status: pending
  - item: published status includes install or index evidence for 0.3.0
    status: pending
  - item: missing token is blocked-by-env; build upload install errors are failed
    status: pending
  - item: core DoD artifacts not rewritten by optional outcome
