dod:
  commands:
    - id: CMD-001
      command: python -m pytest
      core: true
    - id: CMD-ORACLE-001
      command: >
        python -c 'from pathlib import Path; req=["scripts/capture_mobile_mcp_contract.py","scripts/capture_mobile_mcp_calls.py","scripts/assert_mobile_mcp_contract.py","scripts/validate_mobile_mcp_source_coverage.py","scripts/compare_mobile_mcp_image_backends.py"];
        missing=[p for p in req if not Path(p).is_file()]; assert not missing, missing;
        pb=Path("docs/oracle-upgrade-playbook.md"); assert pb.is_file(), pb;
        text=pb.read_text();
        assert "PYMOBILE_MCP_UPSTREAM_SOURCE" in text;
        assert "/Users/" not in text;
        for flag in ["--source","--mode","--expected-revision","--scenarios","--bundle-manifest","blocked"]:
            assert flag in text, flag'
      core: true
