  npm_version: 12.0.0
  sdk_version: 1.26.0
probe:
  python_mcp_version: 1.28.1
  raw_jsonrpc_frames: required
  telemetry_env:
    MOBILEMCP_DISABLE_TELEMETRY: "1"
  initialize_request:
    jsonrpc: "2.0"
    id_policy: "每个隔离 server 固定 request id=1"
    protocolVersion: "2025-11-25"
    capabilities: {}
    clientInfo: {name: pymobile-mcp-contract-probe, version: "1.0.0"}
  case_defaults:
    normalization: exact_no_normalization
    expected_isError: omitted_unless_explicit
    fake_effect_log: required_for_action_tools
oracle_bundle:
  manifest: tests/fixtures/mobile_mcp/bundle-manifest.json
  required_paths:
    - .codestable/features/2026-07-12-mobile-mcp-black-box-contract-parity/mobile-mcp-black-box-contract-parity-scenarios.yaml
    - .codestable/features/2026-07-12-mobile-mcp-black-box-contract-parity/mobile-mcp-black-box-contract-parity-exceptions.yaml
    - scripts/capture_mobile_mcp_contract.py
    - scripts/capture_mobile_mcp_calls.py
    - scripts/assert_mobile_mcp_contract.py
    - scripts/validate_mobile_mcp_source_coverage.py
    - scripts/compare_mobile_mcp_image_backends.py
    - scripts/run_with_timeout.py
    - scripts/contract_common.py
    - tests/fixtures/mobile_mcp/fakes/**
    - tests/fixtures/mobile_mcp/fake-bin/**
    - tests/fixtures/mobile_mcp/input-1080x2400.png
    - tests/mobile_mcp_scenario_runner.py
    - tests/mobile_mcp_stdio_fixture_server.py
  algorithm: "展开 glob 后只取 regular files；repo-relative POSIX UTF-8 path 升序；每项 {path,sha256}；对无空白、object keys 排序的 canonical JSON UTF-8 bytes 计算 aggregate SHA-256"
  report_policy: "CMD-004/005/006/007/008 machine reports 必须记录 entries 与 aggregate hash；任一输入变化但 golden 未更新时 exit 1"

