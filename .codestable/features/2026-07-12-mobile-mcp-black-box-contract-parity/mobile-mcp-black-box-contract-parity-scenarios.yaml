normalization_rules:
  case_default: "case 未显式 normalization 时，严格 exact_no_normalization；validator 必须把该默认写入 machine report"
  raw_frames: "golden 保存 SDK client model 解析前的 JSON-RPC request/response frames；isError 遗漏不得规范化为 false"
  list_tools: "只排序 JSON object keys；保留 tool/array 顺序、缺字段/null 和字符串逐字内容"
  temp_path: "固定 clock/tmpdir；禁止全局删除 path"
  recording_duration: "固定 clock=7s；禁止全局删除 duration"
  recording_size: "固定 1048576 bytes；保留 1.00 MB 格式"
  deterministic_image_fakes: "PNG/JPEG 均比较精确 bytes、mime、decoded dimensions"
  live_image_backend: "sips 1080x2400 scale=3 期望 162x360；ImageMagick/fallback 期望 360x800；与对应 upstream live capture 解码 RGB 后 PSNR>=35dB"

exception_policy:
  disposition_values: [exact, approved_exception, blocked]
  coverage_metric: "scenario_disposition_coverage=100%; exact、approved_exception、blocked 分别计数；blocked 不算 pass"
  scope_guard: "ledger.allowed_case_ids 与 scenarios 中每个 allowed_exception 的 case 集合必须双向相等；EXC-IOS-SCREEN-RECORDING-RUNTIME 还必须 platform=ios 且 device_type=real；EXC-REMOTE-FLEET-RUNTIME 仅限 remote fleet 3 tools / 4 success cases，不能用于 initialize/list_tools/schema"
  ledger_path: .codestable/features/2026-07-12-mobile-mcp-black-box-contract-parity/mobile-mcp-black-box-contract-parity-exceptions.yaml
  report_policy: "CMD-005/006/007 必须记录 ledger SHA-256、approval(pending|approved|rejected)、allowed_case_ids 双向校验和 case disposition；pending/rejected→blocked，approved 且 text/isError/scope 精确匹配→approved_exception，否则 exit 1"
