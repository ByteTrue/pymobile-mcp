    scope: "仅 MOBILEFLEET_ENABLE=1 下 remote fleet 三工具的成功 runtime；发现、title、description、schema、annotations 必须完全一致"
    tools: [mobile_list_remote_devices, mobile_allocate_remote_device, mobile_release_remote_device]
    env: {MOBILEFLEET_ENABLE: "1"}
    allowed_case_ids:
      - S-REMOTE-LIST
      - S-REMOTE-ALLOCATE-IOS
      - S-REMOTE-ALLOCATE-ANDROID
      - S-REMOTE-RELEASE
    upstream_behavior: "mobilecli remote list-devices/allocate/release 成功时原样返回 CLI 字符串"
    python_behavior:
      content_type: text
      text: "mobilecli is not available or not working properly. Please review the documentation at https://github.com/mobile-next/mobile-mcp/wiki for installation instructions. Please fix the issue and try again."
      isError: omitted
    reason: "项目运行时禁止 mobilecli/go-ios，且当前没有 Python remote fleet provider"
    impact: "默认 23-tool 模式无差异；启用 fleet env 后工具可发现但不能完成真实分配/释放"
    transition_condition: "存在可测试的 Python remote fleet provider，并能逐字匹配上游成功输出"

  - id: EXC-IOS-SCREEN-RECORDING-RUNTIME
    approval: approved
    approved_by: user
    approved_on: 2026-07-12
    scope: "iOS 真机 mobile_start_screen_recording / mobile_stop_screen_recording 的成功 runtime；工具发现和 schema 必须完全一致"
