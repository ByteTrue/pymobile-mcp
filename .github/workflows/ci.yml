name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package (dev)
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Unit tests
        run: python -m pytest -q
      - name: Import smoke
        run: python -c "import pymobile_mcp; print(pymobile_mcp.__version__)"
